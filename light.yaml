blueprint:
  name: Advanced Lighting Manager (Normal + Emergency)
  description: Comprehensive control of light groups including conditions, ambient mode, overrides, emergency lighting, and dynamic sun mapping.
  domain: automation
  input:
    # --- NORMAL GROUP ---
    normal_lights:
      name: Normal Group - Lights
      selector:
        target:
          entity:
            domain: light
    normal_brightness:
      name: Brightness Level (Normal)
      description: Enter a value (1-100) or the word 'auto'.
      default: auto
    normal_temp:
      name: Color Temperature in Kelvin (Normal)
      description: Enter a value (e.g., 4000) or the word 'auto'.
      default: auto
    ambient_brightness:
      name: Brightness Level (Ambient)
      description: Enter a value (0-100) or 'auto'. A value of 0 turns off the light.
      default: 0
    ambient_temp:
      name: Color Temperature in Kelvin (Ambient)
      description: Enter a value (e.g., 2700) or the word 'auto'.
      default: auto
    motion_sensors:
      name: Motion Sensors (Optional)
      description: List of sensors triggering the lights. Leave empty to bypass.
      default: []
      selector:
        entity:
          domain: binary_sensor
          device_class: motion
          multiple: true
    timeout:
      name: Timeout (Ambient / Turn Off)
      description: Time (in minutes) of no motion before triggering ambient mode or turning off.
      default: 5
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: min

    # --- AUTO MODE MAPPING ---
    auto_min_brightness:
      name: Auto Mode - Min Brightness
      description: Minimum brightness when the sun is below the horizon (-10°).
      default: 30
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
    auto_max_brightness:
      name: Auto Mode - Max Brightness
      description: Maximum brightness when the sun is high (+20°).
      default: 100
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
    auto_min_temp:
      name: Auto Mode - Min Color Temp (Kelvin)
      description: Warmest temperature when the sun is down.
      default: 2700
      selector:
        number:
          min: 1000
          max: 8000
          unit_of_measurement: K
    auto_max_temp:
      name: Auto Mode - Max Color Temp (Kelvin)
      description: Coldest temperature when the sun is up.
      default: 5500
      selector:
        number:
          min: 1000
          max: 8000
          unit_of_measurement: K

    # --- TIME & PRESENCE ---
    always_on:
      name: Operate 24/7 (Always Active)
      description: If enabled, ignores the time restrictions below.
      default: true
      selector:
        boolean:
    time_from:
      name: Start Time (From)
      default: "00:00:00"
      selector:
        time:
    time_to:
      name: End Time (To)
      default: "00:00:00"
      selector:
        time:
    person_required:
      name: Require presence in the house?
      default: true
      selector:
        boolean:
    person_entity:
      name: Presence Tracker Entity
      description: E.g., zone.home or person.john. Required if the option above is enabled.
      default: zone.home
      selector:
        entity:
          domain: [zone, person]

    # --- OVERRIDES ---
    override_entities:
      name: Override Entities (Ignore Normal Logic)
      description: List of switches/buttons (e.g., emergency). If ANY is ON, normal logic is bypassed.
      default: []
      selector:
        entity:
          domain: [input_boolean, switch]
          multiple: true

    # --- TRANSITIONS ---
    transition_time:
      name: Transition Time
      description: Time in seconds for smooth brightness/state transitions.
      default: 3
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: s

    # --- EMERGENCY GROUP ---
    emergency_lights:
      name: Emergency Group - Lights
      selector:
        target:
          entity:
            domain: light
    emergency_button:
      name: Emergency Button / Switch
      selector:
        entity:
          domain: [input_boolean, switch, button]
    emergency_brightness:
      name: Brightness Level (Emergency)
      default: 100
    emergency_temp:
      name: Color Temperature (Emergency)
      default: 6500

mode: restart

variables:
  in_n_bright: !input normal_brightness
  in_n_temp: !input normal_temp
  in_a_bright: !input ambient_brightness
  in_a_temp: !input ambient_temp
  in_e_bright: !input emergency_brightness
  in_e_temp: !input emergency_temp
  
  # Min/Max Limits for Auto Mode
  min_b: !input auto_min_brightness
  max_b: !input auto_max_brightness
  min_t: !input auto_min_temp
  max_t: !input auto_max_temp
  
  # Dynamic Auto Logic mapped to Sun Elevation
  sun_elevation: "{{ state_attr('sun.sun', 'elevation') | float(0) }}"
  # Clamp elevation between -10 (dark) and 20 (bright)
  clamped_elev: "{{ [ [sun_elevation, -10] | max, 20 ] | min }}"
  # Calculate mapping percentage from 0.0 to 1.0
  elev_pct: "{{ (clamped_elev + 10) / 30 }}"
  
  # Apply mapping to brightness and temperature
  auto_bright: "{{ (min_b + elev_pct * (max_b - min_b)) | int }}"
  auto_temp: "{{ (min_t + elev_pct * (max_t - min_t)) | int }}"
  
  # Final Parameters
  n_bright: "{{ auto_bright if in_n_bright == 'auto' else in_n_bright | int }}"
  n_temp: "{{ auto_temp if in_n_temp == 'auto' else in_n_temp | int }}"
  a_bright: "{{ auto_bright if in_a_bright == 'auto' else in_a_bright | int }}"
  a_temp: "{{ auto_temp if in_a_temp == 'auto' else in_a_temp | int }}"
  e_bright: "{{ auto_bright if in_e_bright == 'auto' else in_e_bright | int }}"
  e_temp: "{{ auto_temp if in_e_temp == 'auto' else in_e_temp | int }}"

  # Time, Presence, Overrides and Transition logic
  is_always_on: !input always_on
  trans_time: !input transition_time
  req_person: !input person_required
  person_ent: !input person_entity
  person_home: >
    {{ not req_person or states(person_ent) not in ['0', 'not_home', 'unavailable', 'unknown'] }}
  
  # Checks if any of the override switches are currently 'on'
  override_list: !input override_entities
  is_overridden: >
    {{ expand(override_list) | selectattr('state', 'eq', 'on') | list | count > 0 if override_list else false }}

trigger:
  # 1. Emergency Trigger
  - platform: state
    entity_id: !input emergency_button
    id: "emergency_trigger"

  # 2. Motion Detected (only if the list is not empty)
  - platform: state
    entity_id: !input motion_sensors
    to: "on"
    id: "motion_on"

  # 3. No Motion for X minutes
  - platform: state
    entity_id: !input motion_sensors
    to: "off"
    for:
      minutes: !input timeout
    id: "motion_off"

  # 4. Start Time
  - platform: time
    at: !input time_from
    id: "time_from"

  # 5. End Time
  - platform: time
    at: !input time_to
    id: "time_to"

action:
  - choose:
      # --- ACTION 1: EMERGENCY OVERRIDE ---
      - conditions:
          - condition: trigger
            id: "emergency_trigger"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.to_state.state == 'off' }}"
                sequence:
                  - service: light.turn_off
                    target: !input emergency_lights
                    data:
                      transition: "{{ trans_time }}"
            default:
              - service: light.turn_on
                target: !input emergency_lights
                data:
                  brightness_pct: "{{ e_bright }}"
                  color_temp_kelvin: "{{ e_temp }}"
                  transition: "{{ trans_time }}"

      # --- ACTION 2: TURN OFF NORMAL (End Time Reached) ---
      - conditions:
          - condition: trigger
            id: "time_to"
          - condition: template
            value_template: "{{ not is_always_on }}"
          - condition: template
            value_template: "{{ not is_overridden }}"
        sequence:
          - service: light.turn_off
            target: !input normal_lights
            data:
              transition: "{{ trans_time }}"

      # --- ACTION 3: MOTION DETECTED (Normal Lighting) ---
      - conditions:
          - condition: trigger
            id: "motion_on"
          - condition: template
            value_template: "{{ not is_overridden }}"
          - condition: or
            conditions:
              - condition: template
                value_template: "{{ is_always_on }}"
              - condition: time
                after: !input time_from
                before: !input time_to
          - condition: template
            value_template: "{{ person_home }}"
        sequence:
          - service: light.turn_on
            target: !input normal_lights
            data:
              brightness_pct: "{{ n_bright }}"
              color_temp_kelvin: "{{ n_temp }}"
              transition: "{{ trans_time }}"

      # --- ACTION 4: NO MOTION OR START TIME REACHED (Ambient Mode) ---
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: "motion_off"
              - condition: trigger
                id: "time_from"
          - condition: template
            value_template: "{{ not is_overridden }}"
          - condition: or
            conditions:
              - condition: template
                value_template: "{{ is_always_on }}"
              - condition: time
                after: !input time_from
                before: !input time_to
          - condition: template
            value_template: "{{ person_home }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ a_bright == 0 }}"
                sequence:
                  - service: light.turn_off
                    target: !input normal_lights
                    data:
                      transition: "{{ trans_time }}"
            default:
              - service: light.turn_on
                target: !input normal_lights
                data:
                  brightness_pct: "{{ a_bright }}"
                  color_temp_kelvin: "{{ a_temp }}"
                  transition: "{{ trans_time }}"
