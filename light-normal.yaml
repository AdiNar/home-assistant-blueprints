blueprint:
  name: Normal Light Manager
  description: Manages lighting based on motion, time, occupancy, and dynamic sun-mapped levels.
  domain: automation
  input:
    normal_lights:
      name: Lights
      selector:
        target:
          entity:
            domain: light
    normal_brightness:
      name: Brightness Level (Normal)
      default: auto
    normal_temp:
      name: Color Temp Kelvin (Normal)
      default: auto
    ambient_brightness:
      name: Brightness Level (Ambient)
      default: 0
    ambient_temp:
      name: Color Temp Kelvin (Ambient)
      default: auto
    motion_sensors:
      name: Motion/Occupancy Sensors (Optional)
      default: []
      selector:
        entity:
          domain: binary_sensor
          device_class: [motion, occupancy]
          multiple: true
    timeout:
      name: Timeout (Ambient / Turn Off)
      default: 5
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: min
    auto_min_brightness:
      name: Auto Mode - Min Brightness (%)
      default: 30
      selector:
        number:
          min: 1
          max: 100
    auto_max_brightness:
      name: Auto Mode - Max Brightness (%)
      default: 100
      selector:
        number:
          min: 1
          max: 100
    auto_min_temp:
      name: Auto Mode - Min Kelvin
      default: 2700
      selector:
        number:
          min: 1000
          max: 8000
    auto_max_temp:
      name: Auto Mode - Max Kelvin
      default: 5500
      selector:
        number:
          min: 1000
          max: 8000
    always_on:
      name: Operate 24/7
      default: true
      selector:
        boolean:
    time_from:
      name: Start Time
      default: "00:00:00"
      selector:
        time:
    time_to:
      name: End Time
      default: "00:00:00"
      selector:
        time:
    person_required:
      name: Require presence?
      default: true
      selector:
        boolean:
    person_entity:
      name: Presence Entity
      default: zone.home
      selector:
        entity:
          domain: [zone, person]
    override_entities:
      name: Override Entities (Emergency switches)
      default: []
      selector:
        entity:
          domain: [input_boolean, switch]
          multiple: true
    transition_time:
      name: Transition Time (s)
      default: 3
      selector:
        number:
          min: 0
          max: 60

mode: restart

trigger:
  - platform: state
    entity_id: !input motion_sensors
    to: "on"
    id: "motion_on"
  - platform: state
    entity_id: !input motion_sensors
    to: "off"
    for:
      minutes: !input timeout
    id: "motion_off"
  - platform: time
    at: !input time_from
    id: "time_from"
  - platform: time
    at: !input time_to
    id: "time_to"

action:
  - choose:
      - conditions:
          - condition: trigger
            id: "time_to"
          - condition: template
            value_template: >
              {% set always_on = input("always_on") %}
              {% set override_entities = input("override_entities") %}
              {% set is_overridden = expand(override_entities) | selectattr('state', 'eq', 'on') | list | count > 0 %}
              {{ not always_on and not is_overridden }}
        sequence:
          - service: light.turn_off
            target: !input normal_lights
            data:
              transition: !input transition_time
      
      - conditions:
          - condition: trigger
            id: "motion_on"
          - condition: template
            value_template: >
              {% set always_on = input("always_on") %}
              {% set time_from = input("time_from") %}
              {% set time_to = input("time_to") %}
              {% set override_entities = input("override_entities") %}
              {% set person_required = input("person_required") %}
              {% set person_entity = input("person_entity") %}
              
              {% set is_overridden = expand(override_entities) | selectattr('state', 'eq', 'on') | list | count > 0 %}
              {% set is_time = always_on or (now().time() >= time_from | as_timedelta and now().time() <= time_to | as_timedelta) %}
              {% set person_home = not person_required or states(person_entity) not in ['0', 'not_home', 'unavailable', 'unknown'] %}
              {{ not is_overridden and is_time and person_home }}
        sequence:
          - service: light.turn_on
            target: !input normal_lights
            data:
              brightness_pct: >
                {% set sun_elev = state_attr('sun.sun', 'elevation') | float(0) %}
                {% set elev_pct = ([ [sun_elev, -10] | max, 20 ] | min + 10) / 30 %}
                {% set min_b = input("auto_min_brightness") | int %}
                {% set max_b = input("auto_max_brightness") | int %}
                {% set auto_b = (min_b + elev_pct * (max_b - min_b)) | int %}
                {% set normal_brightness = input("normal_brightness") %}
                {{ auto_b if normal_brightness == 'auto' else normal_brightness | int }}
              color_temp_kelvin: >
                {% set sun_elev = state_attr('sun.sun', 'elevation') | float(0) %}
                {% set elev_pct = ([ [sun_elev, -10] | max, 20 ] | min + 10) / 30 %}
                {% set min_t = input("auto_min_temp") | int %}
                {% set max_t = input("auto_max_temp") | int %}
                {% set auto_t = (min_t + elev_pct * (max_t - min_t)) | int %}
                {% set normal_temp = input("normal_temp") %}
                {{ auto_t if normal_temp == 'auto' else normal_temp | int }}
              transition: !input transition_time
      
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: "motion_off"
              - condition: trigger
                id: "time_from"
          - condition: template
            value_template: >
              {% set always_on = input("always_on") %}
              {% set time_from = input("time_from") %}
              {% set time_to = input("time_to") %}
              {% set override_entities = input("override_entities") %}
              {% set person_required = input("person_required") %}
              {% set person_entity = input("person_entity") %}
              
              {% set is_overridden = expand(override_entities) | selectattr('state', 'eq', 'on') | list | count > 0 %}
              {% set is_time = always_on or (now().time() >= time_from | as_timedelta and now().time() <= time_to | as_timedelta) %}
              {% set person_home = not person_required or states(person_entity) not in ['0', 'not_home', 'unavailable', 'unknown'] %}
              {{ not is_overridden and is_time and person_home }}
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {% set sun_elev = state_attr('sun.sun', 'elevation') | float(0) %}
                      {% set elev_pct = ([ [sun_elev, -10] | max, 20 ] | min + 10) / 30 %}
                      {% set min_b = input("auto_min_brightness") | int %}
                      {% set max_b = input("auto_max_brightness") | int %}
                      {% set auto_b = (min_b + elev_pct * (max_b - min_b)) | int %}
                      {% set ambient_brightness = input("ambient_brightness") %}
                      {{ (ambient_brightness == 'auto' and auto_b == 0) or ambient_brightness | int == 0 }}
                sequence:
                  - service: light.turn_off
                    target: !input normal_lights
                    data:
                      transition: !input transition_time
            default:
              - service: light.turn_on
                target: !input normal_lights
                data:
                  brightness_pct: >
                    {% set sun_elev = state_attr('sun.sun', 'elevation') | float(0) %}
                    {% set elev_pct = ([ [sun_elev, -10] | max, 20 ] | min + 10) / 30 %}
                    {% set min_b = input("auto_min_brightness") | int %}
                    {% set max_b = input("auto_max_brightness") | int %}
                    {% set auto_b = (min_b + elev_pct * (max_b - min_b)) | int %}
                    {% set ambient_brightness = input("ambient_brightness") %}
                    {{ auto_b if ambient_brightness == 'auto' else ambient_brightness | int }}
                  color_temp_kelvin: >
                    {% set sun_elev = state_attr('sun.sun', 'elevation') | float(0) %}
                    {% set elev_pct = ([ [sun_elev, -10] | max, 20 ] | min + 10) / 30 %}
                    {% set min_t = input("auto_min_temp") | int %}
                    {% set max_t = input("auto_max_temp") | int %}
                    {% set auto_t = (min_t + elev_pct * (max_t - min_t)) | int %}
                    {% set ambient_temp = input("ambient_temp") %}
                    {{ auto_t if ambient_temp == 'auto' else ambient_temp | int }}
                  transition: !input transition_time
