blueprint:
  name: Normal Light Manager
  description: Intelligent lighting management with motion, presence, ambient mode, and sun-mapped dynamic levels.
  domain: automation
  input:
    normal_lights:
      name: Lights
      selector:
        target:
          entity:
            domain: light
    normal_brightness:
      name: Brightness (Normal)
      default: auto
    normal_temp:
      name: Color Temp (Kelvin)
      default: auto
    ambient_brightness:
      name: Brightness (Ambient)
      default: 0
    ambient_temp:
      name: Color Temp (Kelvin Ambient)
      default: auto
    motion_sensors:
      name: Motion/Occupancy Sensors
      default: []
      selector:
        entity:
          domain: binary_sensor
          device_class: [motion, occupancy]
          multiple: true
    timeout:
      name: Timeout (minutes)
      default: 5
      selector:
        number:
          min: 1
          max: 1440
    auto_min_brightness:
      name: Min Brightness (%)
      default: 30
    auto_max_brightness:
      name: Max Brightness (%)
      default: 100
    auto_min_temp:
      name: Min Kelvin
      default: 2700
    auto_max_temp:
      name: Max Kelvin
      default: 5500
    always_on:
      name: Operate 24/7
      default: true
      selector: {boolean: }
    time_from:
      name: Start Time
      default: "00:00:00"
      selector: {time: }
    time_to:
      name: End Time
      default: "23:59:59"
      selector: {time: }
    person_required:
      name: Require presence
      default: true
      selector: {boolean: }
    person_entity:
      name: Presence Entity
      default: zone.home
      selector: {entity: {domain: [zone, person]}}
    override_entities:
      name: Override Entities (Emergency switches)
      default: []
      selector:
        entity:
          domain: [input_boolean, switch]
          multiple: true
    transition_time:
      name: Transition Time (s)
      default: 3

mode: restart

trigger:
  - platform: state
    entity_id: !input motion_sensors
    to: "on"
    id: "motion_on"
  - platform: state
    entity_id: !input motion_sensors
    to: "off"
    for: {minutes: !input timeout}
    id: "motion_off"
  - platform: time
    at: !input time_from
    id: "time_from"
  - platform: time
    at: !input time_to
    id: "time_to"

action:
  - choose:
      # 1. Timed Off
      - conditions:
          - condition: trigger
            id: "time_to"
          - condition: template
            value_template: "{{ not input('always_on') and expand(input('override_entities')) | selectattr('state', 'eq', 'on') | list | count == 0 }}"
        sequence:
          - service: light.turn_off
            target: !input normal_lights
            data: {transition: !input transition_time}
      
      # 2. Motion Detected (Turn On)
      - conditions:
          - condition: trigger
            id: "motion_on"
          - condition: template
            value_template: >
              {% set is_overridden = expand(input('override_entities')) | selectattr('state', 'eq', 'on') | list | count > 0 %}
              {% set person_home = not input('person_required') or states(input('person_entity')) not in ['0', 'not_home', 'unavailable', 'unknown'] %}
              {{ not is_overridden and person_home }}
        sequence:
          - service: light.turn_on
            target: !input normal_lights
            data:
              brightness_pct: >
                {% set elev = state_attr('sun.sun', 'elevation') | float(0) %}
                {% set pct = ([ [elev, -10] | max, 20 ] | min + 10) / 30 %}
                {% set auto_b = (input('auto_min_brightness') | int + pct * (input('auto_max_brightness') | int - input('auto_min_brightness') | int)) | int %}
                {{ auto_b if input('normal_brightness') == 'auto' else input('normal_brightness') | int }}
              color_temp_kelvin: >
                {% set elev = state_attr('sun.sun', 'elevation') | float(0) %}
                {% set pct = ([ [elev, -10] | max, 20 ] | min + 10) / 30 %}
                {% set auto_t = (input('auto_min_temp') | int + pct * (input('auto_max_temp') | int - input('auto_min_temp') | int)) | int %}
                {{ auto_t if input('normal_temp') == 'auto' else input('normal_temp') | int }}
              transition: !input transition_time

      # 3. No Motion (Ambient Mode or Turn Off)
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: "motion_off"
              - condition: trigger
                id: "time_from"
          - condition: template
            value_template: "{{ expand(input('override_entities')) | selectattr('state', 'eq', 'on') | list | count == 0 }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ input('ambient_brightness') | int == 0 }}"
                sequence:
                  - service: light.turn_off
                    target: !input normal_lights
                    data: {transition: !input transition_time}
            default:
              - service: light.turn_on
                target: !input normal_lights
                data:
                  brightness_pct: "{{ input('ambient_brightness') | int }}"
                  color_temp_kelvin: "{{ input('ambient_temp') | int }}"
                  transition: !input transition_time
